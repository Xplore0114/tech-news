name: LLM论文每日更新

on:
  schedule:
    - cron: '0 1 * * *' # 北京时间 09:00
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: llm-papers-daily
  cancel-in-progress: false

jobs:
  update-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 更新论文并推送
        env:
          XPLORE_REPO_TOKEN: ${{ secrets.XPLORE_REPO_TOKEN }}
          FEISHU_BOT_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
        run: bash scripts/update_llm_papers.sh

      - name: 失败告警
        if: failure() && secrets.FEISHU_BOT_WEBHOOK != ''
        env:
          FEISHU_BOT_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          webhook = os.getenv('FEISHU_BOT_WEBHOOK', '').strip()
          if not webhook:
              raise SystemExit(0)
          text = f"⚠️ LLM论文每日更新失败\n仓库: {os.getenv('GITHUB_REPOSITORY')}\nRun: {os.getenv('RUN_URL')}"
          payload = json.dumps({"msg_type": "text", "content": {"text": text}}, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request(webhook, data=payload, headers={"Content-Type": "application/json; charset=utf-8"})
          urllib.request.urlopen(req, timeout=15).read()
          PY
